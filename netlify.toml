[build]
# Push schema changes to Turso before each build, then build the site.
# Requires ASTRO_DB_REMOTE_URL and ASTRO_DB_APP_TOKEN to be set in Netlify.
command = "astro db push --remote && astro build --remote"
publish = "dist"

[build.environment]
NODE_VERSION = "24"

# Astro hashes all filenames in /_astro/ — safe to cache indefinitely.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts and other public static assets.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
