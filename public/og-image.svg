<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef3e8"/>
      <stop offset="100%" stop-color="#fde5c8"/>
    </linearGradient>
    <linearGradient id="dot-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8704a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8704a" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dot grid -->
  <g fill="url(#dot-fade)">
    <circle cx="60" cy="60" r="4"/><circle cx="120" cy="60" r="4"/><circle cx="180" cy="60" r="4"/><circle cx="240" cy="60" r="4"/>
    <circle cx="60" cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="180" cy="120" r="4"/><circle cx="240" cy="120" r="4"/>
    <circle cx="60" cy="180" r="4"/><circle cx="120" cy="180" r="4"/><circle cx="180" cy="180" r="4"/><circle cx="240" cy="180" r="4"/>
    <circle cx="960" cy="450" r="4"/><circle cx="1020" cy="450" r="4"/><circle cx="1080" cy="450" r="4"/><circle cx="1140" cy="450" r="4"/>
    <circle cx="960" cy="510" r="4"/><circle cx="1020" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1140" cy="510" r="4"/>
    <circle cx="960" cy="570" r="4"/><circle cx="1020" cy="570" r="4"/><circle cx="1080" cy="570" r="4"/><circle cx="1140" cy="570" r="4"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#e8704a"/>

  <!-- Orange accent shape -->
  <circle cx="980" cy="200" r="220" fill="#e8704a" fill-opacity="0.07"/>
  <circle cx="980" cy="200" r="160" fill="#e8704a" fill-opacity="0.07"/>

  <!-- Left content area -->
  <!-- Brand badge -->
  <rect x="80" y="80" width="220" height="40" rx="20" fill="#e8704a" fill-opacity="0.12"/>
  <text x="190" y="105" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#c95a35" text-anchor="middle" letter-spacing="1">DEVREL(ISH)</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#1a1a1a" letter-spacing="-2">Find your people.</text>

  <!-- Subheadline -->
  <text x="80" y="310" font-family="system-ui, sans-serif" font-size="32" font-weight="400" fill="#6b7280">Gatherings for developer relations</text>
  <text x="80" y="352" font-family="system-ui, sans-serif" font-size="32" font-weight="400" fill="#6b7280">professionals around the world.</text>

  <!-- Decorative divider -->
  <rect x="80" y="400" width="80" height="5" rx="3" fill="#e8704a"/>

  <!-- Bottom tagline -->
  <text x="80" y="460" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#e8704a">devrelish.com</text>

  <!-- Bottom border -->
  <rect x="0" y="622" width="1200" height="8" fill="#e8704a" fill-opacity="0.3"/>
</svg>
